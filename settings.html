<!-- Game Settings Menu -->
<div id="settings-menu" class="settings-menu hidden">
  <div class="settings-container">
    <h2>Settings</h2>
    
    <div class="settings-group">
      <label>Master Volume</label>
      <input type="range" id="volume-slider" min="0" max="100" value="80">
      <span id="volume-value">80%</span>
    </div>
    
    <div class="settings-group">
      <label>
        <input type="checkbox" id="enable-notifications" checked>
        Enable Notifications
      </label>
    </div>
    
    <div class="settings-group">
      <label>
        <input type="checkbox" id="enable-music" checked>
        Background Music
      </label>
    </div>
    
    <div class="settings-group">
      <label>Graphics Quality</label>
      <select id="graphics-quality">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    
    <div class="settings-group">
      <label>Game Speed</label>
      <select id="game-speed">
        <option value="0.5">0.5x (Slow)</option>
        <option value="1" selected>1x (Normal)</option>
        <option value="1.5">1.5x (Fast)</option>
        <option value="2">2x (Very Fast)</option>
      </select>
    </div>
    
    <div class="settings-actions">
      <button id="save-game-btn" class="btn btn-primary">Save Game</button>
      <button id="load-game-btn" class="btn btn-primary">Load Game</button>
      <button id="reset-game-btn" class="btn btn-danger">Reset Game</button>
    </div>
    
    <div class="settings-actions">
      <button id="close-settings-btn" class="btn btn-secondary">Close</button>
    </div>
  </div>
</div>
